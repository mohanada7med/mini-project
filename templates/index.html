<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Submit Data</title>
    <style>
        :root {
            color-scheme: dark;
            color: #111827;
            background: #f4f7fb;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at top, rgba(59, 130, 246, 0.15), transparent 35%), linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }

        .page {
            width: min(100%, 760px);
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
            padding: 36px;
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 2.5vw, 2.5rem);
            letter-spacing: -0.04em;
            color: #0f172a;
        }

        .subtitle {
            margin: 10px 0 0;
            color: #475569;
            font-size: 1rem;
            line-height: 1.75;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #eff6ff;
            border-radius: 999px;
            color: #2563eb;
            font-size: 0.95rem;
            font-weight: 600;
        }

        form {
            display: grid;
            gap: 20px;
        }

        label {
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        input,
        textarea {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 16px 18px;
            font-size: 1rem;
            color: #0f172a;
            background: #f8fafc;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
            background: #ffffff;
        }

        textarea {
            min-height: 160px;
            resize: vertical;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: flex-start;
            margin-top: 4px;
        }

        .button,
        .button-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            padding: 14px 20px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 0.98rem;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .button {
            background: #2563eb;
            color: #ffffff;
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.18);
        }

        .button:hover,
        .button-link:hover {
            transform: translateY(-1px);
        }

        .button-link {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .button-link:hover {
            background: #e2e8f0;
        }

        .flash {
            border-radius: 18px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 16px 18px;
            color: #1d4ed8;
            font-weight: 600;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .footer {
            margin-top: 28px;
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="header">
            <h1>Submit Your Data</h1>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash">
            {% for message in messages %}
            <div>{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="post">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name" required />
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required />
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message..."></textarea>
            </div>

            <div class="actions">
                <button class="button" type="submit">Add</button>
                <a class="button-link" href="/show">Show all data</a>
            </div>
        </form>

        <p class="footer">Designed for fast data entry with an elegant, professional interface.</p>
    </main>
</body>

</html>
