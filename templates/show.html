<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>All Submissions</title>
    <style>
        :root {
            color-scheme: dark;
            color: #111827;
            background: #f8fafc;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px;
            background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        }

        .page {
            width: min(100%, 980px);
            background: #ffffff;
            border-radius: 32px;
            padding: 36px;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.12);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 2.4vw, 2.4rem);
            color: #0f172a;
        }

        .subtitle {
            margin: 10px 0 0;
            max-width: 620px;
            color: #475569;
            line-height: 1.75;
            font-size: 1rem;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 22px;
            border-radius: 14px;
            background: #2563eb;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 30px rgba(37, 99, 235, 0.18);
        }

        .table-card {
            overflow: hidden;
            border-radius: 24px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        thead {
            background: linear-gradient(90deg, #2563eb 0%, #7c3aed 100%);
            color: #ffffff;
        }

        th,
        td {
            padding: 18px 20px;
            text-align: left;
            font-size: 0.96rem;
            vertical-align: middle;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        tbody tr:nth-child(even) {
            background: #f8fafc;
        }

        tbody tr:hover {
            background: #eff6ff;
        }

        .empty-state {
            padding: 24px;
            color: #475569;
            text-align: center;
        }

        .meta {
            margin-top: 16px;
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <main class="page">
        <div class="header">
            <div>
                <h1>All Submissions</h1>
                
            </div>
            <a class="button" href="/">Back to form</a>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Message</th>
                        <th>Created At</th>
                    </tr>
                </thead>
                <tbody>
                    {% if submissions %}
                    {% for row in submissions %}
                    <tr>
                        <td>{{ row.id }}</td>
                        <td>{{ row.name }}</td>
                        <td>{{ row.email }}</td>
                        <td>{{ row.message }}</td>
                        <td>{{ row.created_at }}</td>
                    </tr>
                    {% endfor %}
                    {% else %}
                    <tr>
                        <td class="empty-state" colspan="5">No data found yet. Add new records from the form page.</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

    </main>
</body>

</html>
